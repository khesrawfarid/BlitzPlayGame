<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <filter id="glow-grid" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-path" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-tower">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0515" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <path d="M0,25 L400,25 M0,50 L400,50 M0,75 L400,75 M0,100 L400,100 M0,125 L400,125 M0,150 L400,150 M0,175 L400,175 M0,200 L400,200 M0,225 L400,225" />
    <path d="M25,0 L25,250 M50,0 L50,250 M75,0 L75,250 M100,0 L100,250 M125,0 L125,250 M150,0 L150,250 M175,0 L175,250 M200,0 L200,250 M225,0 L225,250 M250,0 L250,250 M275,0 L275,250 M300,0 L300,250 M325,0 L325,250 M350,0 L350,250 M375,0 L375,250" />
  </g>

  <!-- Path -->
  <path d="M0,75 L125,75 L125,175 L250,175 L250,50 L350,50 L350,125 L400,125" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="40" stroke-linecap="square" />
  <path d="M0,75 L125,75 L125,175 L250,175 L250,50 L350,50 L350,125 L400,125" fill="none" stroke="#2dd4bf" stroke-width="4" filter="url(#glow-path)" />

  <!-- Enemies (Red glowing dots) -->
  <circle cx="50" cy="75" r="5" fill="#f43f5e" filter="url(#glow-grid)" />
  <circle cx="80" cy="75" r="5" fill="#f43f5e" filter="url(#glow-grid)" />
  <circle cx="125" cy="110" r="5" fill="#f43f5e" filter="url(#glow-grid)" />
  <circle cx="210" cy="175" r="5" fill="#f43f5e" filter="url(#glow-grid)" />

  <!-- Towers (Blue glowing squares) -->
  <rect x="70" y="35" width="20" height="20" fill="#3b82f6" filter="url(#glow-tower)" rx="4"/>
  <rect x="150" y="140" width="20" height="20" fill="#3b82f6" filter="url(#glow-tower)" rx="4"/>
  <rect x="210" y="200" width="20" height="20" fill="#3b82f6" filter="url(#glow-tower)" rx="4"/>
  
  <!-- Projectiles (Yellow lasers) -->
  <line x1="80" y1="45" x2="80" y2="70" stroke="#fef08a" stroke-width="2" filter="url(#glow-tower)" />
  <line x1="160" y1="150" x2="130" y2="115" stroke="#fef08a" stroke-width="2" filter="url(#glow-tower)" />
</svg>
