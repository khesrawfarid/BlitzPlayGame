<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />

  <g transform="translate(65, 15)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="55" height="55" rx="8" fill="rgba(255,255,255,0.05)" />
    
    <rect x="70" y="0" width="55" height="55" rx="8" fill="#0ea5e9" filter="url(#glow-blue)"/>
    <text x="97" y="37" font-family="sans-serif" font-size="30" text-anchor="middle" fill="#fff">💎</text>

    <rect x="140" y="0" width="55" height="55" rx="8" fill="rgba(255,255,255,0.05)"/>
    
    <rect x="210" y="0" width="55" height="55" rx="8" fill="#0ea5e9" filter="url(#glow-blue)"/>
    <text x="237" y="37" font-family="sans-serif" font-size="30" text-anchor="middle" fill="#fff">⚡</text>

    <!-- Row 2 -->
    <rect x="0" y="70" width="55" height="55" rx="8" fill="#0ea5e9" filter="url(#glow-blue)"/>
    <text x="27" y="107" font-family="sans-serif" font-size="30" text-anchor="middle" fill="#fff">⭐</text>

    <rect x="70" y="70" width="55" height="55" rx="8" fill="rgba(255,255,255,0.05)"/>
    
    <rect x="140" y="70" width="55" height="55" rx="8" fill="#0ea5e9" filter="url(#glow-blue)"/>
    <text x="167" y="107" font-family="sans-serif" font-size="30" text-anchor="middle" fill="#fff">🔥</text>

    <rect x="210" y="70" width="55" height="55" rx="8" fill="rgba(255,255,255,0.05)"/>

    <!-- Row 3 -->
    <rect x="0" y="140" width="55" height="55" rx="8" fill="rgba(255,255,255,0.05)"/>
    <rect x="70" y="140" width="55" height="55" rx="8" fill="rgba(255,255,255,0.05)"/>
    
    <rect x="140" y="140" width="55" height="55" rx="8" fill="#0ea5e9" filter="url(#glow-blue)"/>
    <text x="167" y="177" font-family="sans-serif" font-size="30" text-anchor="middle" fill="#fff">🍀</text>

    <rect x="210" y="140" width="55" height="55" rx="8" fill="rgba(255,255,255,0.05)"/>
  </g>
</svg>
